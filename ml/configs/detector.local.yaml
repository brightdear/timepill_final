project:
  name: pill_detector_local

paths:
  dataset_yaml: ./dataset.local.yaml
  output_dir: ../runs/detector

model:
  source: yolo11n.yaml

train:
  epochs: 50
  imgsz: 640
  batch: 8
  patience: 15
  device: 0
  workers: 4
  seed: 42
  cache: false

augment:
  hsv_h: 0.015
  hsv_s: 0.5
  hsv_v: 0.3
  degrees: 10.0
  translate: 0.05
  scale: 0.2
  fliplr: 0.0
  flipud: 0.0
  mosaic: 0.2
  close_mosaic: 10
  perspective: 0.0

export:
  enabled: false
  formats:
    - onnx
